<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2330"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#bg)" stroke="#27303f" stroke-width="2"/>
  <!-- rising trend line -->
  <path d="M9 50 L22 40 L33 45 L54 16" fill="none" stroke="#3fb950" stroke-opacity=".45" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- candlesticks -->
  <line x1="18" y1="23" x2="18" y2="51" stroke="#3fb950" stroke-width="3"/>
  <rect x="13" y="29" width="10" height="14" rx="2" fill="#3fb950"/>
  <line x1="32" y1="17" x2="32" y2="45" stroke="#f85149" stroke-width="3"/>
  <rect x="27" y="22" width="10" height="14" rx="2" fill="#f85149"/>
  <line x1="46" y1="9" x2="46" y2="38" stroke="#3fb950" stroke-width="3"/>
  <rect x="41" y="15" width="10" height="15" rx="2" fill="#3fb950"/>
  <!-- graduation-cap badge (training) -->
  <circle cx="50" cy="49" r="10.5" fill="#f7931a"/>
  <g fill="#0b0e14">
    <!-- mortarboard top -->
    <path d="M50 42.2 L58 46 L50 49.8 L42 46 Z"/>
    <!-- cap base -->
    <path d="M45.6 48.4 L45.6 52.2 Q50 54.8 54.4 52.2 L54.4 48.4 L50 50.4 Z"/>
    <!-- tassel -->
    <path d="M57 46.5 L57 51.5" stroke="#0b0e14" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <circle cx="57" cy="52.4" r="1.3"/>
  </g>
</svg>
